<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minato Namikaze - Dashboard API Premium</title>
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLES GLOBAUX ET COULEURS THÈME MINATO --- */
        :root {
            --primary: #f1c40f; 
            --primary-glow: rgba(241, 196, 15, 0.4);
            --bg-glass: rgba(10, 10, 18, 0.75);
            --border-glass: rgba(241, 196, 15, 0.2);
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('https://i.imgur.com/3XGeH9D.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Voile d'ombrage pour le contraste */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -2;
        }

        /* Conteneur pour la pluie de particules dorées */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- NAVIGATION / HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .profile-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-wrapper {
            position: relative;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, var(--primary), #e67e22);
            animation: pulseGlow 2.5s infinite alternate;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #000;
        }

        .profile-info h1 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .profile-info p {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .admin-trigger {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .admin-trigger:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 15px var(--primary);
        }

        .notification-bell {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .notification-bell:hover {
            transform: scale(1.1) rotate(15deg);
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
            animation: heartBeat 1.5s infinite;
        }

        /* --- INTERFACE PRINCIPALE --- */
        .main-container {
            display: flex;
            padding: 40px 50px;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Barre Latérale */
        .sidebar {
            width: 320px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 25px;
            height: fit-content;
        }

        .sidebar h3 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .category-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .category-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid transparent;
        }

        .category-item:hover, .category-item.active {
            background: rgba(241, 196, 15, 0.1);
            border-left-color: var(--primary);
            transform: translateX(6px);
        }

        /* Zone des Fiches */
        .content-area {
            flex: 1;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* Fiche API Style Premium */
        .api-card {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .api-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px var(--primary-glow);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .api-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
        }

        .api-badge-method {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 9px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .method-get { background: #2ecc71; color: #fff; }
        .method-post { background: #9b59b6; color: #fff; }

        .api-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .api-endpoint {
            background: rgba(0, 0, 0, 0.35);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-copy {
            background: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding-left: 10px;
            transition: transform 0.2s;
        }

        .btn-copy:hover { transform: scale(1.25); }

        .btn-test {
            width: 100%;
            background: linear-gradient(90deg, var(--primary), #e67e22);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .btn-test:hover {
            letter-spacing: 2px;
            box-shadow: 0 0 20px var(--primary);
        }

        /* --- COMPOSANTS CACHÉS ET MODALES --- */
        .secret-trigger {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 18px;
            height: 18px;
            background: transparent;
            cursor: pointer;
            z-index: 999;
            opacity: 0.05;
        }

        .social-panel {
            position: fixed;
            bottom: 45px;
            right: 45px;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 25px;
            display: none;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 0 35px rgba(0,0,0,0.7);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 310px;
        }

        .social-links {
            display: flex;
            justify-content: space-around;
            font-size: 1.8rem;
        }

        .social-links a {
            color: var(--text);
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: var(--primary);
            transform: scale(1.25) translateY(-3px);
        }

        .gmail-form input, .gmail-form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glass);
            border-radius: 6px;
            padding: 10px;
            color: white;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .admin-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: rgba(12, 12, 22, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--primary);
            padding: 30px;
            border-radius: 16px;
            z-index: 2000;
            width: 90%;
            max-width: 440px;
            display: none;
            box-shadow: 0 0 40px var(--primary-glow);
        }

        .admin-modal.active {
            display: block;
            animation: modalEffect 0.3s forwards;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: var(--text-dim); }
        .form-group input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); padding: 11px; border-radius: 6px; color: white; }

        /* --- KEYFRAMES ANIMATIONS --- */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px var(--primary-glow); }
            100% { box-shadow: 0 0 25px var(--primary); }
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes modalEffect {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        /* Particules style Éclair Jaune */
        .energy-particle {
            position: absolute;
            background: radial-gradient(circle, rgba(241,196,15,0.8) 0%, rgba(241,196,15,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: particleUp 4s linear infinite;
        }
        @keyframes particleUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-10vh) scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div id="particles-container"></div>

    <!-- Lecteur audio masqué pour l'ambiance sonore musicale -->
    <audio id="bg-music" loop>
        <source src="../../assets/music/bg.mp3" type="audio/mpeg">
    </audio>

    <!-- ENTÊTE DE LA PAGE -->
    <header>
        <div class="profile-container">
            <div class="avatar-wrapper">
                <img id="author-avatar" src="https://i.imgur.com/3XGeH9D.jpeg" alt="Chris st">
            </div>
            <div class="profile-info">
                <h1 id="site-title">Minato Namikaze</h1>
                <p>Créateur : <span id="author-name">Chris st</span></p>
            </div>
        </div>

        <div class="header-actions">
            <button class="admin-trigger" onclick="openAdminModal()"><i class="fa-solid fa-lock"></i> Admin</button>
            <div class="notification-bell" onclick="alert('Notification 1: Bienvenue sur le Dashboard Minato V2 !\nNotification 2: Le chargement dynamique automatique et sécurisé est opérationnel.')">
                <i class="fa-solid fa-bell"></i>
                <span class="badge">2</span>
            </div>
        </div>
    </header>

    <!-- ZONE DE CONTENU PRINCIPALE -->
    <div class="main-container">
        <!-- BARRE LATERALE DES CATEGORIES -->
        <aside class="sidebar">
            <h3>Catégories</h3>
            <ul class="category-list" id="category-box">
                <li class="category-item active" onclick="filterCategory('all')"><span>Toutes</span> <i class="fa-solid fa-layer-group"></i></li>
                <li class="category-item" onclick="filterCategory('ai')"><span>Intelligence Artificielle</span> <i class="fa-solid fa-robot"></i></li>
                <li class="category-item" onclick="filterCategory('download')"><span>Téléchargement</span> <i class="fa-solid fa-download"></i></li>
            </ul>
        </aside>

        <!-- GRILLE DYNAMIQUE -->
        <main class="content-area">
            <div class="cards-grid" id="api-cards-container">
                <!-- Les fiches d'API s'injecteront ici de manière automatique sans altérer la mise en page -->
            </div>
        </main>
    </div>

    <!-- ZONE SECRET SOCIAL PANNEAU -->
    <div class="secret-trigger" onclick="toggleSocialPanel()"></div>
    <div class="social-panel" id="social-panel">
        <h3>Réseaux de l'Auteur</h3>
        <div class="social-links">
            <a href="https://github.com" target="_blank"><i class="fa-brands fa-github"></i></a>
            <a href="https://facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://youtube.com" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://wa.me/" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
        <hr style="border-color: var(--border-glass); margin: 12px 0;">
        <div class="gmail-form">
            <input type="email" placeholder="Votre Adresse Email (Gmail)" id="user-email">
            <textarea placeholder="Votre message pour l'auteur..." rows="3" id="user-msg"></textarea>
            <button class="btn-test" onclick="alert('Message transmis avec succès à Chris st !')">Envoyer</button>
        </div>
    </div>

    <!-- ESPACE DE CONFIGURATION ADMIN PROTECTION PAR MOT DE PASSE -->
    <div class="admin-modal" id="admin-modal">
        <h2>Espace Administration</h2>
        <div class="form-group">
            <label>Clé d'accès Secrète</label>
            <input type="password" id="admin-pass" placeholder="Entrez le mot de passe admin...">
        </div>
        <div class="form-group">
            <label>Lien URL de l'image de Fond</label>
            <input type="text" id="new-bg-url" placeholder="Ex: https://image.png">
        </div>
        <div class="form-group">
            <label>Nouveau Nom d'Auteur</label>
            <input type="text" id="new-author-name" placeholder="Ex: Chris st">
        </div>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="btn-test" onclick="saveAdminChanges()">Sauvegarder</button>
            <button class="btn-test" style="background: #c0392b; color: white;" onclick="closeAdminModal()">Annuler</button>
        </div>
    </div>

    <!-- LOGIQUE LOGICIELLE DE SYNCHRONISATION SANS FAILLE -->
    <script>
        let allApis = [];

        // Gestion de la musique de fond
        window.addEventListener('click', () => {
            const music = document.getElementById('bg-music');
            if(music && music.paused) {
                music.play().catch(() => {});
            }
        });

        // Générateur d'ambiance visuelle animée
        function createParticles() {
            const container = document.getElementById('particles-container');
            if(!container) return;
            for (let i = 0; i < 35; i++) {
                let p = document.createElement('div');
                p.classList.add('energy-particle');
                let size = Math.random() * 7 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.animationDuration = Math.random() * 4 + 3 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // Récupération des données APIs en provenance de la configuration backend Node
        async function loadDashboardApis() {
            try {
                const res = await fetch('/api/list');
                const data = await res.json();
                allApis = data.apis || [];
                displayCards(allApis);
            } catch (err) {
                console.log("Mode local détecté ou serveur déconnecté.");
                displayCards([]);
            }
        }

        // Affichage et rendu visuel propre des fiches d'API
        function displayCards(apis) {
            const container = document.getElementById('api-cards-container');
            if(!container) return;
            container.innerHTML = '';

            if(apis.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--text-dim);">Aucune API chargée. Les modules du dossier /api/ apparaîtront ici automatiquement dès l'initialisation du serveur.</p>`;
                return;
            }

            apis.forEach(api => {
                const card = document.createElement('div');
                card.classList.add('api-card');
                card.setAttribute('data-category', api.category);

                const linkTarget = api.link && api.link.length > 0 ? api.link[0] : `/${api.name}`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="api-badge-method method-${api.method.toLowerCase()}">${api.method}</span>
                        <span class="api-title">${api.name.toUpperCase()} <span style="font-size:0.7rem; color:var(--text-dim);">v${api.version || '1.0'}</span></span>
                    </div>
                    <p class="api-desc">${api.description || 'Module de test d\'API opérationnel.'}</p>
                    <div style="font-size: 0.8rem; color: var(--primary); font-weight:600;">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Guide: ${api.guide || 'Entrez les paramètres requis.'}
                    </div>
                    <div class="api-endpoint">
                        <span>${linkTarget}</span>
                        <button class="btn-copy" onclick="copyToClipboard('${linkTarget}')"><i class="fa-solid fa-copy"></i></button>
                    </div>
                    <button class="btn-test" onclick="runApiExecution('${linkTarget}')">Tester l'API</button>
                `;
                container.appendChild(card);
            });
        }

        function filterCategory(category) {
            const cards = document.querySelectorAll('.api-card');
            cards.forEach(card => {
                if(category === 'all' || card.getAttribute('data-category') === category) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('active');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("Endpoint copié dans le presse-papier : " + text);
        }

        async function runApiExecution(endpoint) {
            let userParam = "";
            if (endpoint.includes('q=')) {
                userParam = prompt("Entrez la valeur du paramètre 'q' pour le test :", "Hello !");
                if (userParam === null) return;
                endpoint = endpoint.replace('q=', `q=${encodeURIComponent(userParam)}`);
            }
            alert(`Lancement de la requête vers : ${endpoint}`);
            try {
                const res = await fetch(endpoint);
                const json = await res.json();
                alert(`[RÉPONSE API]\n\n${JSON.stringify(json, null, 2)}`);
            } catch (e) {
                alert("Échec du test. Assurez-vous que l'API est correctement configurée et active sur le serveur.");
            }
        }

        function toggleSocialPanel() {
            const panel = document.getElementById('social-panel');
            if(panel) panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        function openAdminModal() { document.getElementById('admin-modal').classList.add('active'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.remove('active'); }

        function saveAdminChanges() {
            const secret = document.getElementById('admin-pass').value;
            if(secret === "2$modombo") {
                const bg = document.getElementById('new-bg-url').value;
                const author = document.getElementById('new-author-name').value;
                if(bg) {
                    document.body.style.background = `url('${bg}') no-repeat center center fixed`;
                    document.body.style.backgroundSize = 'cover';
                }
                if(author) {
                    document.getElementById('author-name').innerText = author;
                }
                alert("Configurations validées et appliquées avec succès !");
                closeAdminModal();
            } else {
                alert("Clé secrète invalide. Accès refusé.");
            }
        }

        document.addEventListener("DOMContentLoaded", loadDashboardApis);
    </script>
</body>
</html>
