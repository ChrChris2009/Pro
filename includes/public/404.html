<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Hiraishin No Jutsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a14;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .error-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(241, 196, 15, 0.2);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.1);
            animation: float 4s ease-in-out infinite;
        }
        h1 {
            font-size: 6rem;
            margin: 0;
            color: #f1c40f;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }
        p {
            color: #b3b3b3;
            font-size: 1.2rem;
            margin: 15px 0 30px 0;
        }
        .btn-back {
            background: linear-gradient(90deg, #f1c40f, #e67e22);
            border: none;
            padding: 12px 30px;
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #f1c40f;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Téléportation Échouée</h2>
        <p>L'endpoint ou la page demandé n'existe pas dans cette dimension.</p>
        <a href="/" class="btn-back"><i class="fa-solid fa-house"></i> Revenir au QG</a>
    </div>
</body>
</html>
